<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colony Wars — Low Poly Strategy</title>
  <meta name="description" content="Build your colony, gather resources, and battle other commanders in this low poly browser strategy game." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       AUTH SCREEN
  ═══════════════════════════════════════════════ -->
  <div id="auth-screen" class="screen active">
    <div class="auth-bg" id="auth-bg">
      <!-- Low poly triangles injected by JS -->
    </div>
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-gem"></div>
        <h1 class="logo-title">COLONY <span>WARS</span></h1>
        <p class="logo-tagline">Build · Conquer · Survive</p>
      </div>

      <div class="auth-card glass">
        <div class="auth-tabs">
          <button class="tab-btn active" id="login-tab-btn" onclick="switchTab('login')">LOGIN</button>
          <button class="tab-btn" id="register-tab-btn" onclick="switchTab('register')">REGISTER</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active" autocomplete="on">
          <div class="input-group">
            <label for="login-email">Commander Email</label>
            <input type="email" id="login-email" name="email" placeholder="commander@colony.com" required autocomplete="email" />
          </div>
          <div class="input-group">
            <label for="login-password">Access Code</label>
            <input type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <div id="login-error" class="auth-error" role="alert"></div>
          <button type="submit" class="btn-primary btn-full" id="login-btn">⚔ ENTER BASE</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form" autocomplete="on">
          <div class="input-group">
            <label for="reg-name">Commander Name</label>
            <input type="text" id="reg-name" name="displayName" placeholder="Commander Zara" required autocomplete="name" />
          </div>
          <div class="input-group">
            <label for="reg-email">Commander Email</label>
            <input type="email" id="reg-email" name="email" placeholder="commander@colony.com" required autocomplete="email" />
          </div>
          <div class="input-group">
            <label for="reg-password">Access Code</label>
            <input type="password" id="reg-password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
          </div>
          <div id="register-error" class="auth-error" role="alert"></div>
          <button type="submit" class="btn-primary btn-full" id="register-btn">🏰 ESTABLISH COLONY</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       GAME SCREEN
  ═══════════════════════════════════════════════ -->
  <div id="game-screen" class="screen">

    <!-- Resource / Top Bar -->
    <header class="resource-bar glass">
      <div class="commander-badge">
        <div class="cmdr-hex">⚔</div>
        <span id="commander-name" class="cmdr-name">Commander</span>
      </div>

      <div class="resources-group">
        <div class="resource-pill" id="res-minerals" title="Minerals">
          <span class="res-icon mineral-icon">⛏</span>
          <div class="res-values">
            <span class="res-value" id="val-minerals">0</span>
            <span class="res-cap" id="cap-minerals">/1000</span>
          </div>
          <span class="res-rate" id="rate-minerals">+0/s</span>
        </div>
        <div class="resource-pill" id="res-energy" title="Energy">
          <span class="res-icon energy-icon">⚡</span>
          <div class="res-values">
            <span class="res-value" id="val-energy">0</span>
            <span class="res-cap" id="cap-energy">/1000</span>
          </div>
          <span class="res-rate" id="rate-energy">+0/s</span>
        </div>
        <div class="resource-pill" id="res-oxygen" title="Oxygen">
          <span class="res-icon oxygen-icon">◎</span>
          <div class="res-values">
            <span class="res-value" id="val-oxygen">0</span>
            <span class="res-cap" id="cap-oxygen">/1000</span>
          </div>
          <span class="res-rate" id="rate-oxygen">+0/s</span>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn-attack" id="attack-btn" onclick="initiateAttack()">⚔ ATTACK</button>
        <button class="btn-secondary" id="save-btn" onclick="manualSave()">💾 SAVE</button>
        <button class="btn-logout" title="Logout" onclick="logoutPlayer()">⏻</button>
      </div>
    </header>

    <!-- Main Game Layout -->
    <div class="game-layout">
      
      <!-- Fullscreen Grid Map -->
      <main class="map-area">
        <div class="map-controls">
           <button id="zoom-in-btn" class="zoom-btn" onclick="zoomMap(1)" title="Zoom In">+</button>
           <button id="zoom-out-btn" class="zoom-btn" onclick="zoomMap(-1)" title="Zoom Out">−</button>
        </div>
        <div class="grid-wrapper" id="grid-wrapper">
          <canvas id="effect-canvas" class="effect-canvas"></canvas>
          <div id="game-grid" class="game-grid"></div>
        </div>
      </main>

      <!-- Floating HUD: Left Side (Army / Build / Intel) -->
      <aside class="panel build-panel" id="build-panel">
        <div class="panel-header">
          <h2 class="panel-title">🏗 Base Console</h2>
          <button class="btn-icon-cancel" id="cancel-build-btn" onclick="cancelBuild()" style="display:none" title="Cancel placement">✕</button>
        </div>
        <div class="build-list" id="build-list"></div>
        <div class="panel-divider"></div>
        <div class="panel-section">
          <h3 class="section-title">⚔ Recruit Troops</h3>
          <div class="unit-list" id="unit-list"></div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel-section">
          <h3 class="section-title">🪖 Your Army</h3>
          <div class="army-display" id="army-display"><p class="hint-text">No units trained.</p></div>
        </div>
      </aside>

      <!-- Floating HUD: Right Side (Intel overlay) -->
      <aside class="panel info-panel" id="info-panel">
        <div class="panel-header"><h2 class="panel-title">🔍 Intel</h2></div>
        <div id="selected-info"><p class="hint-text">Select a building.</p></div>
        <div class="panel-divider"></div>
        <div class="panel-section">
          <h3 class="section-title">📋 Defense Log</h3>
          <div class="defense-log" id="defense-log"><p class="hint-text">No attacks.</p></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       BATTLE SCREEN (FULLSCREEN ATTACK VIEW)
  ═══════════════════════════════════════════════ -->
  <div id="battle-screen" class="screen">
    
    <!-- Top HUD for Battle -->
    <header class="resource-bar glass" style="justify-content: space-between;">
      <div class="commander-badge" style="background: rgba(229, 57, 53, 0.2); border-color: #e53935;">
        <div class="cmdr-hex" style="background: linear-gradient(135deg, #e53935, #b71c1c);">⚔</div>
        <span class="cmdr-name">ENEMY BASE</span>
      </div>
      <button class="btn-danger" id="retreat-btn" onclick="retreatFromBattle()">🏳️ RETREAT</button>
    </header>

    <main class="map-area">
      <!-- Fullscreen Battle Canvas Wrapper -->
      <div class="grid-wrapper" id="battle-grid-wrapper" style="margin-top: 0;">
        <canvas id="attack-canvas" style="position: absolute; inset: -400px; width: calc(100% + 800px); height: calc(100% + 800px);"></canvas>
      </div>
    </main>

    <!-- Bottom HUD (Deploying Units) -->
    <footer class="battle-hud-bottom glass">
      <div class="deploy-carousel" id="deploy-units">
        <!-- JS populates deploy unit cards here -->
      </div>
      <div class="battle-controls">
        <button class="btn-primary btn-full" id="start-battle-btn" onclick="startBattle()" style="width: 250px; font-size: 16px;">▶ LAUNCH ATTACK</button>
      </div>
    </footer>
  </div>

  <!-- ═══════════════════════════════════════════════
       UPGRADE MODAL
  ═══════════════════════════════════════════════ -->
  <div id="upgrade-modal" class="modal-overlay" onclick="closeModal('upgrade-modal')">
    <div class="modal glass" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="upgrade-title">UPGRADE STRUCTURE</h2>
        <button class="btn-icon-cancel" onclick="closeModal('upgrade-modal')">✕</button>
      </div>
      <div class="modal-body" id="upgrade-body"></div>
      <div class="modal-footer">
        <button class="btn-primary" id="upgrade-confirm-btn">UPGRADE</button>
        <button class="btn-danger" id="demolish-modal-btn">DEMOLISH</button>
        <button class="btn-secondary" onclick="closeModal('upgrade-modal')">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       BATTLE RESULT MODAL
  ═══════════════════════════════════════════════ -->
  <div id="result-modal" class="modal-overlay">
    <div class="modal glass">
      <div class="modal-header">
        <h2 id="result-title">BATTLE COMPLETE</h2>
      </div>
      <div class="modal-body" id="result-body"></div>
      <div class="modal-footer">
        <button class="btn-primary" onclick="closeBattleResult()">RETURN TO BASE</button>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay active">
    <div class="loading-hex"></div>
    <p class="loading-text">Establishing Colony...</p>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
